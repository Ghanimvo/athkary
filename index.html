<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#c9973a" id="themeColor">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="الأذكار">
<meta name="description" content="أذكار الصباح والمساء من السنة النبوية الصحيحة">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>أذكار الصباح والمساء</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --morning-bg: #fdf6e3;
    --morning-card: #fffbf0;
    --morning-gold: #c9973a;
    --morning-deep: #7a5c1e;
    --morning-accent: #e8c96a;
    --morning-text: #3a2c10;
    --morning-muted: #8a7550;
    --morning-border: #e2c97e;
    --morning-shadow: rgba(180, 140, 60, 0.18);

    --evening-bg: #0d1117;
    --evening-card: #141b24;
    --evening-silver: #8fa8c8;
    --evening-deep: #c8d8f0;
    --evening-accent: #3a5a8a;
    --evening-text: #e0eaf8;
    --evening-muted: #6a88aa;
    --evening-border: #2a3f5a;
    --evening-shadow: rgba(60, 100, 160, 0.22);

    --transition: 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Naskh Arabic', 'Amiri', serif;
    min-height: 100vh;
    min-height: 100dvh;
    transition: background var(--transition), color var(--transition);
    overflow-x: hidden;
  }

  body.morning { background: var(--morning-bg); color: var(--morning-text); }
  body.evening { background: var(--evening-bg); color: var(--evening-text); }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.04;
    background-image: repeating-linear-gradient(45deg, currentColor 0, currentColor 1px, transparent 0, transparent 50%);
    background-size: 20px 20px;
  }

  /* Install banner */
  #installBanner {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    border-radius: 16px;
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 600;
    gap: 12px;
    align-items: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    min-width: 280px;
    justify-content: space-between;
    animation: slideUp 0.4s ease both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  body.morning #installBanner { background: var(--morning-card); border: 1.5px solid var(--morning-border); color: var(--morning-text); }
  body.evening #installBanner { background: var(--evening-card); border: 1.5px solid var(--evening-border); color: var(--evening-text); }

  #installBanner.show { display: flex; }

  .install-text { font-size: 13px; line-height: 1.5; }
  .install-text strong { display: block; font-size: 14px; }

  .install-btns { display: flex; gap: 8px; flex-shrink: 0; }

  .btn-install {
    padding: 8px 16px;
    border-radius: 10px;
    border: none;
    font-family: 'Noto Naskh Arabic', serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-install:active { opacity: 0.75; }
  body.morning .btn-install.primary { background: var(--morning-gold); color: #fff; }
  body.evening .btn-install.primary { background: var(--evening-accent); color: #fff; }
  body.morning .btn-install.secondary { background: transparent; color: var(--morning-muted); }
  body.evening .btn-install.secondary { background: transparent; color: var(--evening-muted); }

  /* Header */
  .header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 48px 24px 28px;
  }

  .header-ornament {
    font-size: 24px;
    margin-bottom: 10px;
    opacity: 0.65;
    letter-spacing: 8px;
    transition: color var(--transition);
  }

  body.morning .header-ornament { color: var(--morning-gold); }
  body.evening .header-ornament { color: var(--evening-silver); }

  .header h1 {
    font-family: 'Amiri', serif;
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 6px;
    transition: color var(--transition);
  }

  body.morning .header h1 { color: var(--morning-deep); }
  body.evening .header h1 { color: var(--evening-deep); }

  .header-sub { font-size: 14px; opacity: 0.55; }

  /* Toggle */
  .toggle-wrapper {
    display: flex;
    justify-content: center;
    margin: 0 auto 40px;
    position: relative;
    z-index: 10;
  }

  .toggle-btn {
    display: flex;
    border-radius: 50px;
    overflow: hidden;
    border: 2px solid;
    transition: border-color var(--transition), box-shadow var(--transition);
  }

  body.morning .toggle-btn { border-color: var(--morning-border); box-shadow: 0 4px 20px var(--morning-shadow); }
  body.evening .toggle-btn { border-color: var(--evening-border); box-shadow: 0 4px 20px var(--evening-shadow); }

  .toggle-option {
    padding: 12px 28px;
    font-family: 'Noto Naskh Arabic', serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
    border: none;
    outline: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  body.morning .toggle-option.morning-opt { background: var(--morning-gold); color: #fff; }
  body.morning .toggle-option.evening-opt { background: var(--morning-card); color: var(--morning-muted); }
  body.evening .toggle-option.morning-opt { background: var(--evening-card); color: var(--evening-muted); }
  body.evening .toggle-option.evening-opt { background: var(--evening-accent); color: #fff; }

  .toggle-icon { font-size: 18px; }

  /* Cards grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px 100px;
    position: relative;
    z-index: 10;
  }

  /* Card */
  .card {
    border-radius: 20px;
    padding: 28px 24px 22px;
    position: relative;
    overflow: hidden;
    transition: background var(--transition), border-color var(--transition), box-shadow var(--transition), transform 0.3s ease;
    animation: cardIn 0.5s ease both;
  }

  .card:hover { transform: translateY(-3px); }
  .card:active { transform: scale(0.99); }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  body.morning .card { background: var(--morning-card); border: 1.5px solid var(--morning-border); box-shadow: 0 6px 28px var(--morning-shadow), 0 1px 0 rgba(255,255,255,0.8) inset; }
  body.evening .card { background: var(--evening-card); border: 1.5px solid var(--evening-border); box-shadow: 0 6px 28px var(--evening-shadow); }

  .card::before {
    content: attr(data-num);
    position: absolute;
    top: 14px;
    left: 18px;
    font-family: 'Amiri', serif;
    font-size: 44px;
    font-weight: 700;
    line-height: 1;
    opacity: 0.06;
    transition: color var(--transition);
  }

  body.morning .card::before { color: var(--morning-gold); }
  body.evening .card::before { color: var(--evening-silver); }

  .card-top-line {
    width: 44px;
    height: 3px;
    border-radius: 2px;
    margin-bottom: 18px;
    transition: background var(--transition);
  }

  body.morning .card-top-line { background: var(--morning-gold); }
  body.evening .card-top-line { background: var(--evening-silver); }

  .card-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; margin-bottom: 10px; opacity: 0.45; }

  .card-title {
    font-family: 'Amiri', serif;
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 18px;
    line-height: 1.4;
    transition: color var(--transition);
  }

  body.morning .card-title { color: var(--morning-deep); }
  body.evening .card-title { color: var(--evening-deep); }

  .dhikr-box {
    border-radius: 12px;
    padding: 18px 16px;
    margin-bottom: 16px;
    transition: background var(--transition), border-color var(--transition);
  }

  body.morning .dhikr-box { background: linear-gradient(135deg, #fef9ec, #fdf3d4); border: 1px solid var(--morning-accent); }
  body.evening .dhikr-box { background: linear-gradient(135deg, #1a2535, #1e2d40); border: 1px solid var(--evening-accent); }

  .dhikr-text {
    font-family: 'Amiri Quran', 'Amiri', serif;
    font-size: 18px;
    line-height: 2.1;
    text-align: center;
    transition: color var(--transition);
  }

  body.morning .dhikr-text { color: var(--morning-text); }
  body.evening .dhikr-text { color: var(--evening-text); }

  .repeat-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 8px;
    transition: background var(--transition);
  }

  body.morning .repeat-badge { background: var(--morning-gold); color: #fff; }
  body.evening .repeat-badge { background: var(--evening-accent); color: #fff; }

  .fadl-section {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 14px;
    padding: 12px;
    border-radius: 10px;
    transition: background var(--transition);
  }

  body.morning .fadl-section { background: rgba(201, 151, 58, 0.08); }
  body.evening .fadl-section { background: rgba(90, 127, 170, 0.1); }

  .fadl-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
  .fadl-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; margin-bottom: 3px; opacity: 0.5; }
  .fadl-text { font-size: 13.5px; line-height: 1.9; opacity: 0.85; }

  .source-line {
    font-size: 11px;
    opacity: 0.38;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid;
    transition: border-color var(--transition);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  body.morning .source-line { border-color: var(--morning-border); }
  body.evening .source-line { border-color: var(--evening-border); }

  .warning-note {
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 8px;
    margin-top: 6px;
    opacity: 0.7;
    transition: background var(--transition);
  }

  body.morning .warning-note { background: rgba(200, 100, 50, 0.08); color: #8a4020; }
  body.evening .warning-note { background: rgba(180, 120, 60, 0.12); color: #c8a070; }

  .section-header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 4px 0;
  }

  .section-header-text {
    font-family: 'Amiri', serif;
    font-size: 17px;
    font-weight: 700;
    white-space: nowrap;
    transition: color var(--transition);
  }

  body.morning .section-header-text { color: var(--morning-gold); }
  body.evening .section-header-text { color: var(--evening-silver); }

  .section-header-line {
    flex: 1;
    height: 1px;
    transition: background var(--transition);
  }

  body.morning .section-header-line { background: var(--morning-border); }
  body.evening .section-header-line { background: var(--evening-border); }

  .footer-note {
    grid-column: 1 / -1;
    text-align: center;
    font-size: 12.5px;
    padding: 20px;
    border-radius: 14px;
    border: 1px dashed;
    line-height: 2;
    transition: all var(--transition);
  }

  body.morning .footer-note { border-color: var(--morning-border); color: var(--morning-muted); background: rgba(255,255,255,0.5); }
  body.evening .footer-note { border-color: var(--evening-border); color: var(--evening-muted); background: rgba(255,255,255,0.02); }

  .card:nth-child(2)  { animation-delay: 0.04s; }
  .card:nth-child(3)  { animation-delay: 0.08s; }
  .card:nth-child(4)  { animation-delay: 0.12s; }
  .card:nth-child(5)  { animation-delay: 0.16s; }
  .card:nth-child(6)  { animation-delay: 0.20s; }
  .card:nth-child(7)  { animation-delay: 0.24s; }
  .card:nth-child(8)  { animation-delay: 0.28s; }
  .card:nth-child(9)  { animation-delay: 0.32s; }
  .card:nth-child(10) { animation-delay: 0.36s; }

  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; gap: 18px; padding: 0 14px 100px; }
    .dhikr-text { font-size: 17px; }
    .toggle-option { padding: 11px 22px; }
  }
</style>
</head>
<body class="morning">

<div id="installBanner">
  <div class="install-text">
    <strong>أضف التطبيق لشاشتك</strong>
    للوصول السريع بدون إنترنت
  </div>
  <div class="install-btns">
    <button class="btn-install primary" id="btnInstall">تثبيت</button>
    <button class="btn-install secondary" id="btnDismiss">لاحقاً</button>
  </div>
</div>

<div class="header">
  <div class="header-ornament">&#x2731; &#x2605; &#x2731;</div>
  <h1>أذكار الصباح والمساء</h1>
  <p class="header-sub">من السنة النبوية الصحيحة</p>
</div>

<div class="toggle-wrapper">
  <div class="toggle-btn">
    <button class="toggle-option morning-opt" onclick="setMode('morning')">
      <span class="toggle-icon">&#9728;</span> الصباح
    </button>
    <button class="toggle-option evening-opt" onclick="setMode('evening')">
      <span class="toggle-icon">&#9790;</span> المساء
    </button>
  </div>
</div>

<div class="cards-grid" id="cardsGrid"></div>

let currentMode = 'morning';

function setMode(mode) {
  currentMode = mode;
  document.body.className = mode;
  document.getElementById('themeColor').setAttribute('content', mode === 'morning' ? '#c9973a' : '#0d1117');
  renderCards();
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  const isMorning = currentMode === 'morning';
  grid.innerHTML = '';

  const sectionHeader = document.createElement('div');
  sectionHeader.className = 'section-header';
  sectionHeader.innerHTML = `
    <div class="section-header-line"></div>
    <span class="section-header-text">${isMorning ? 'أذكار الصباح' : 'أذكار المساء'}</span>
    <div class="section-header-line"></div>
  `;
  grid.appendChild(sectionHeader);

  adhkar.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-num', item.num);
    card.style.animationDelay = (i * 0.05) + 's';

    const dhikrText = isMorning ? item.morning : item.evening;
    const fadlText  = isMorning ? item.fadl    : item.fadlEvening;

    card.innerHTML = `
      <div class="card-top-line"></div>
      <div class="card-label">الذكر ${item.num}</div>
      <div class="card-title">${item.title}</div>
      <div class="dhikr-box">
        <div class="dhikr-text">${dhikrText}</div>
        ${item.repeat ? `<div style="text-align:center"><span class="repeat-badge">${item.repeat}</span></div>` : ''}
      </div>
      <div class="fadl-section">
        <div class="fadl-icon">${isMorning ? '&#9728;' : '&#9790;'}</div>
        <div>
          <div class="fadl-label">الفضل</div>
          <div class="fadl-text">${fadlText}</div>
        </div>
      </div>
      ${item.warning ? `<div class="warning-note">${item.warning}</div>` : ''}
      <div class="source-line">
        <span>&#128214;</span>
        <span>${item.source}</span>
      </div>
    `;
    grid.appendChild(card);
  });

  const footer = document.createElement('div');
  footer.className = 'footer-note';
  footer.innerHTML = `للتحقق من ألفاظ جميع الأذكار ومواقيتها الدقيقة, يُرجع إلى كتاب <strong>"حصن المسلم"</strong> للشيخ سعيد القحطاني<br>جميع الأذكار من السنة الصحيحة أو الحسنة`;
  grid.appendChild(footer);
}

// PWA install
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});

document.getElementById('btnInstall').addEventListener('click', async () => {
  document.getElementById('installBanner').classList.remove('show');
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
  }
});

document.getElementById('btnDismiss').addEventListener('click', () => {
  document.getElementById('installBanner').classList.remove('show');
});

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
  deferredPrompt = null;
});

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

renderCards();
</script>
</body>
</html>
